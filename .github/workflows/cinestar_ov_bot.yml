name: CineStar Konstanz OV Bot

on:
  schedule:
    # Robust option (DST-proof): run every 6 hours in UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: cinestar-ov-bot
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      TZ: Europe/Berlin
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Check Python
        run: python3 --version

      - name: Install dependencies
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Pull latest state
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

      - name: Run bot (send)
        run: |
          . .venv/bin/activate
          python -m src.main --send

      - name: Commit updated state (if changed)
        run: |
          git status --porcelain
          if git diff --quiet -- state/state.json; then
            echo "No state changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add state/state.json
          git commit -m "Update bot state [skip ci]"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi

            git rebase --abort || true
            echo "State push attempt ${attempt} failed, retrying..."
            sleep 5
          done

          echo "Failed to push updated state after retries."
          exit 1
